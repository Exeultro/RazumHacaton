services:
  postgres:
    image: postgres:15-alpine
    container_name: razum-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: razum_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - razum-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d razum_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: razum-backend
    environment:
      PORT: 8000
      GIN_MODE: debug
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: root
      DB_NAME: razum_db
      DB_SSLMODE: disable
      JWT_SECRET: razum-hackathon-secret-key-2026
      JWT_EXPIRE_HOURS: 24
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - razum-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: razum-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - razum-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  razum-network:
    driver: bridge